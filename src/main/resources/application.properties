# ──────────────────────────────────────────────────────────────────────────────
# application.properties — Ntra. Sra. María Auxiliadora
# Las variables sensibles se inyectan desde variables de entorno.
# ──────────────────────────────────────────────────────────────────────────────

spring.application.name=stock

# ── Base de datos (Supabase / PostgreSQL) ─────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate: verifica que el esquema coincida con las entidades (no lo modifica)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Puerto del servidor ───────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── CORS ─────────────────────────────────────────────────────────────────────
# Dominio(s) del frontend separados por comas; usa * para desarrollo local.
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:*}
